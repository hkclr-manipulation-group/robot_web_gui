<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Robot Web GUI</title>

<link rel="stylesheet" href="./styles.css" />

<script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three":
      "https://unpkg.com/three@0.160.0/build/three.module.js",

    "three/addons/":
      "https://unpkg.com/three@0.160.0/examples/jsm/",

    "three/examples/jsm/":
      "https://unpkg.com/three@0.160.0/examples/jsm/",

    "urdf-loader":
      "https://unpkg.com/urdf-loader@0.12.4/src/URDFLoader.js"
  }
}
</script>

</head>

<body>

<!-- Top bar -->

<header class="topbar">

  <div class="title-block">
    <h1>Robot Web GUI</h1>
    <div class="subtitle">
      Web based robot visualization and control
    </div>
  </div>

  <div class="top-actions">

    <input id="urdfPath" value="./urdf/lrlita/robot.urdf"/>

    <button id="loadUrdfBtn">
      Load URDF
    </button>

    <label class="inline-file">

      <span>Open URDF</span>

      <input id="urdfFile" type="file" accept=".urdf,.xml"/>

    </label>

  </div>

</header>


<!-- Main layout -->

<div class="app">


<!-- LEFT : 3D Viewer -->

<section class="viewer-panel">

  <div class="viewer-toolbar">

    <div class="status-block">

      <span class="label">Status</span>

      <span id="status" class="status-text">
        Ready
      </span>

    </div>

    <div class="viewer-buttons">

      <button id="fitBtn">Fit</button>

      <button id="resetViewBtn">Reset</button>

      <button id="homeBtn">Home</button>

      <button id="zeroBtn">Zero</button>

      <button id="stopBtn" class="danger">Stop</button>

    </div>

  </div>


  <div class="viewer-container">

    <div id="viewer"></div>

  </div>


  <div class="pose-bar">

    <div>

      <strong>EE Pose</strong>

      <span id="eePose">
        x=0 y=0 z=0
      </span>

    </div>

    <div>

      <strong>Robot</strong>

      <span id="activeRobotText">
        Preview
      </span>

    </div>

  </div>

</section>



<!-- RIGHT : Control Panel -->

<aside class="control-panel">



<!-- Robot Manager -->

<section class="card">

<h2>Robot</h2>

<select id="robotSelect"></select>

<input id="gatewayUrl" placeholder="Gateway URL"/>

<div class="button-row">

<button id="connectBtn">Connect</button>

<button id="disconnectBtn">Disconnect</button>

<button id="pingBtn">Ping</button>

</div>

</section>



<!-- Joint Control -->

<section class="card">

<h2>Joint Space</h2>

<div id="jointContainer"></div>

</section>



<!-- Task Space -->

<section class="card">

<h2>Task Space</h2>

<div id="taskSpaceContainer"></div>

</section>



<!-- Planning -->

<section class="card">

<h2>Planning</h2>

<input id="planSteps" type="number" value="50"/>

<input id="playDelay" type="number" value="40"/>

<div class="button-grid">

<button id="recordPoseBtn">Record</button>

<button id="planJointBtn">Plan Joint</button>

<button id="planCartesianBtn">Plan Cart</button>

<button id="playPathBtn">Play</button>

<button id="clearPathBtn">Clear</button>

</div>

<pre id="pathPreview"></pre>

</section>



</aside>

</div>


<script type="module" src="./js/main.js"></script>

</body>
</html>
