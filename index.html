<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URDF Robot Web GUI</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/examples/jsm/":"https://unpkg.com/three@0.160.0/examples/jsm/",
      "urdf-loader":"https://unpkg.com/urdf-loader@0.12.4/src/URDFLoader.js"
    }
  }
  </script>
</head>
<body>

<div id="app">
  <aside id="sidebar">
    <h2>Robot</h2>
    <input id="urdfPath" value="./urdf/robot.urdf">
    <button id="loadBtn">Load URDF</button>
    <hr>
    <h3>Joint Control</h3>
    <span id="jointCount">0 joints</span>
    <div id="jointContainer"></div>
    <hr>
    <h3>Task Space</h3>
    X <input id="tx" type="number" step="0.01">
    Y <input id="ty" type="number" step="0.01">
    Z <input id="tz" type="number" step="0.01">
    <button id="movePoseBtn">Move Pose</button>
  </aside>

  <main>
    <div id="viewer"></div>
    <div id="status">Ready</div>
  </main>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
